<form action="https://cooklang.mailcoach.app/subscribe/762f88e2-d763-49c5-8337-5236d636e592" method="post" class="w-full max-w-md my-6">
    <div class="flex flex-col sm:flex-row gap-2">
        <input
            type="email"
            name="email"
            id="newsletter-email-{{ .Ordinal }}"
            required
            aria-label="Email Address"
            placeholder="Your email address"
            class="flex-1 px-4 py-2 border border-cooklang-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cooklang-orange focus:border-transparent"
        >
        <button type="submit" class="btn btn-primary justify-center">
            Subscribe
        </button>
    </div>
    <p class="text-sm text-cooklang-gray-500 mt-2">Once a month we will post you with our updates and stories.</p>
</form>
